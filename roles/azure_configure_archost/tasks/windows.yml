---
- name: Check if Connected Machine Agent is Downloaded
  ansible.windows.win_stat:
    path: C:\AzureConnectedMachineAgent.msi
    get_checksum: False
  register: azure_configure_archost_azcmagent_win_downloaded

- name: Download the Connected Machine Agent on Windows servers
  ansible.windows.win_get_url:
    url: https://aka.ms/AzureConnectedMachineAgent
    dest: C:\AzureConnectedMachineAgent.msi
  when: not azure_configure_archost_azcmagent_win_downloaded.stat.exists

- name: Install the Connected Machine Agent on Windows servers
  ansible.windows.win_package:
    path: C:\AzureConnectedMachineAgent.msi
  when: not azure_configure_archost_azcmagent_win_downloaded.stat.exists

- name: Check if the Connected Machine Agent has already been connected on Windows
  ansible.windows.win_command: azcmagent check
  register: azure_configure_archost_azcmagent_win_connected
  ignore_errors: yes
  failed_when: (azure_configure_archost_azcmagent_win_connected.rc not in [ 0, 16 ])
  changed_when: False

- name: Connect the Connected Machine Agent on Windows servers to Azure Arc
  ansible.windows.win_command:
    argv:
      - azcmagent.exe
      - connect
      - --service-principal-id
      - "{{ azure_client_id }}"
      - --service-principal-secret
      - "{{ azure_secret }}"
      - --resource-group
      - "{{ resource_group }}"
      - --tenant-id
      - "{{ azure_tenant }}"
      - --location
      - "{{ azure_configure_archost_location }}"
      - --subscription-id
      - "{{ azure_subscription_id }}"
      - --tags
      - "{{ azure_configure_archost_processed_tags }}"
  when:
    - azure_configure_archost_azcmagent_win_connected.rc is defined
    - azure_configure_archost_azcmagent_win_connected.rc != 0
